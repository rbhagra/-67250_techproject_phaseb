<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/style.css">
    <title>Buy Tickets - MonoMuse</title>
    <script src="./static/script.js" defer></script>
</head>
<!-- Ticket form code adapted from https://www.w3schools.com/Css/css_form.asp and https://docs.worldpay.com/apis/usecomm/eprotect/codesamples/html-checkout-samples--> 
<body>
    <div class="container">
        <header class="header">
            <img id="logo" src="./static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>
        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buyticket.html">Buy Tickets</a>
            <a href="membership.html">Membership</a>
            <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">☰</a>
        </nav>
        <main class="main">
            <h2>Buy Tickets</h2>
            <p> Tickets are $18 each. Fill out the form below to secue your visit.</p>

            <form id="checkoutForm" class="checkout-form" novalidate>

                <div class="form-group">
                    <label for="visitDate">Visit Date <span class="required">*</span></label>
                    <input type="date" id="visitDate" name="visitDate" required>
                    <span class="error-msg" id="visitDateError"></span>
                </div>

                <div class="form-group">
                    <label for="ticketType">Ticket Type <span class="required">*</span></label>
                    <select id="ticketType" name="ticketType" required>
                        <option value="">-- Select a type --</option>
                        <option value="general">General</option>
                        <option value="student">Student</option>
                        <option value="member">Member</option>
                    </select>
                    <span class="error-msg" id="ticketTypeError"></span>
                </div>

                <div class="form-group">
                    <label for="ticketQty">Quantity (1–10) <span class="required">*</span></label>
                    <input type="number" id="ticketQty" name="ticketQty" min="1" max="10" value="1" required>
                    <span class="error-msg" id="ticketQtyError"></span>
                </div>

                <div class="form-group">
                    <label>Total Price</label>
                    <p class="total-price" id="totalPrice">$18.00</p>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="zipCode">Zip Code <span class="optional">(optional)</span></label>
                    <input type="text" id="zipCode" name="zipCode" placeholder="e.g. 15213" maxlength="5">
                    <span class="error-msg" id="zipCodeError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="mailingList" name="mailingList">
                    <label for="mailingList">Join our mailing list</label>
                </div>

                <button type="submit" class="checkout-btn">Place Order</button>
            </form>
        </main>
        <footer class="footer">
            <p>&copy; <span id="copyYear"></span> MonoMuse.</p>
        </footer>
    </div>
</body>
</html>
